# Nginx config for food-calorie API
# Replace silentzz.online with your actual domain

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name silentzz.online www.silentzz.online;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name silentzz.online;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/silentzz.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/silentzz.online/privkey.pem;

    # WeChat mini-program requires TLS 1.2+
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Upload file size limit
    client_max_body_size 10M;

    # Reverse proxy to FastAPI backend
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
